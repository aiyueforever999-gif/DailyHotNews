name: 每日热榜日报推送

on:
  schedule:
    # UTC 时间 00:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-daily-hot-news:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行脚本
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python daily_hot_news.py

      - name: 提交生成的文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ html/
          git diff --cached --quiet || git commit -m "chore: daily hot news update $(date +%Y-%m-%d)"
          git push
